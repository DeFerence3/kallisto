<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Geospatial API - User Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "tertiary": "#605c78",
            "surface-container-high": "#e1e9ee",
            "secondary-dim": "#465468",
            "tertiary-container": "#e3dbfd",
            "secondary-fixed": "#d5e3fc",
            "tertiary-fixed": "#e3dbfd",
            "secondary-container": "#d5e3fc",
            "on-background": "#2a3439",
            "inverse-primary": "#dae2fd",
            "primary-container": "#dae2fd",
            "inverse-surface": "#0b0f10",
            "on-error-container": "#752121",
            "on-primary": "#f7f7ff",
            "secondary-fixed-dim": "#c7d5ed",
            "outline": "#717c82",
            "on-primary-fixed": "#373f54",
            "on-surface-variant": "#566166",
            "error": "#9f403d",
            "on-surface": "#2a3439",
            "surface-container-lowest": "#ffffff",
            "surface": "#f7f9fb",
            "on-error": "#fff7f6",
            "surface-bright": "#f7f9fb",
            "surface-container-highest": "#d9e4ea",
            "on-tertiary-fixed": "#3e3a54",
            "primary": "#565e74",
            "on-secondary-fixed-variant": "#4e5c71",
            "error-dim": "#4e0309",
            "error-container": "#fe8983",
            "surface-variant": "#d9e4ea",
            "surface-tint": "#565e74",
            "tertiary-fixed-dim": "#d4cdee",
            "on-secondary-container": "#455367",
            "primary-fixed-dim": "#ccd4ee",
            "tertiary-dim": "#54506b",
            "outline-variant": "#a9b4b9",
            "on-tertiary": "#fcf7ff",
            "surface-container": "#e8eff3",
            "on-secondary": "#f8f8ff",
            "inverse-on-surface": "#9a9d9f",
            "primary-fixed": "#dae2fd",
            "on-tertiary-container": "#514d68",
            "on-secondary-fixed": "#324053",
            "secondary": "#526074",
            "surface-dim": "#cfdce3",
            "on-primary-container": "#4a5167",
            "on-primary-fixed-variant": "#535b71",
            "surface-container-low": "#f0f4f7",
            "primary-dim": "#4a5268",
            "background": "#f7f9fb",
            "on-tertiary-fixed-variant": "#5b5672"
          },
          fontFamily: {
            "headline": ["Inter", "sans-serif"],
            "body": ["Inter", "sans-serif"],
            "label": ["Inter", "sans-serif"]
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f7f9fb; color: #2a3439; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .atmospheric-shadow { box-shadow: 0 10px 30px -5px rgba(42, 52, 57, 0.08); }
    .primary-gradient { background: linear-gradient(135deg, #565e74 0%, #4a5268 100%); }
  </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center p-6 md:p-12 bg-surface">
  <div class="max-w-6xl w-full grid grid-cols-1 md:grid-cols-2 gap-8">
    <div class="space-y-8 flex flex-col">
      <section class="bg-surface-container-lowest rounded-xl atmospheric-shadow p-6 border border-outline-variant/10">
        <div class="flex items-center justify-between mb-6">
          <h3 class="text-xl font-bold text-on-surface flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">person_add</span> Add User
          </h3>
        </div>
        <form id="addUserForm" class="space-y-5">
          <div>
            <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-1.5">User Name</label>
            <input id="userName" class="w-full bg-surface-container-low border-none rounded-lg px-4 py-2.5 text-sm outline-none" placeholder="e.g. Logistics Node 01" type="text" required />
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-1.5">Latitude</label>
              <input id="latitude" class="w-full bg-surface-container-low border-none rounded-lg px-4 py-2.5 text-sm outline-none" placeholder="34.0522" type="number" step="any" required />
              <p id="latitudeError" class="text-xs text-error mt-1 hidden"></p>
            </div>
            <div>
              <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-1.5">Longitude</label>
              <input id="longitude" class="w-full bg-surface-container-low border-none rounded-lg px-4 py-2.5 text-sm outline-none" placeholder="-118.2437" type="number" step="any" required />
              <p id="longitudeError" class="text-xs text-error mt-1 hidden"></p>
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-1.5">Service Radius (KM): <span id="radiusValue">250</span>km</label>
            <div class="relative">
              <input id="serviceRadius" class="w-full h-1.5 bg-surface-container-highest rounded-lg appearance-none cursor-pointer accent-primary" max="500" min="1" type="range" value="250" oninput="document.getElementById('radiusValue').innerText = this.value" />
              <div class="flex justify-between mt-2 text-[10px] font-mono text-outline">
                <span>1km</span><span>250km</span><span>500km</span>
              </div>
            </div>
          </div>
          <div id="formError" class="text-sm text-error mt-2 hidden"></div>
          <button class="w-full mt-4 py-3 primary-gradient text-white rounded-lg font-bold shadow-lg shadow-primary/10 hover:shadow-primary/20 transition-all active:translate-y-0.5" type="submit">Submit</button>
        </form>
      </section>
      <section class="bg-surface-container-lowest rounded-xl atmospheric-shadow p-6 border border-outline-variant/10">
        <div class="mb-6">
          <h3 class="text-xl font-bold text-on-surface flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">distance</span> Search User
          </h3>
        </div>
        <form id="searchform" class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-[10px] font-bold text-on-surface-variant uppercase mb-1">Search Latitude</label>
              <input id="searchLat" class="w-full bg-surface-container-low border-none rounded-lg px-4 py-2 text-sm outline-none" placeholder="34.05" type="number" step="any" required />
            </div>
            <div>
              <label class="block text-[10px] font-bold text-on-surface-variant uppercase mb-1">Search Longitude</label>
              <input id="searchLon" class="w-full bg-surface-container-low border-none rounded-lg px-4 py-2 text-sm outline-none" placeholder="-118.24" type="number" step="any" required />
            </div>
          </div>
          <button type="submit" class="w-full py-2 bg-primary text-white rounded-lg text-sm font-bold flex items-center justify-center gap-2 hover:bg-primary-dim transition-colors">
            <span class="material-symbols-outlined text-sm">search</span> Search
          </button>
        </form>
        <div class="mt-8">
          <h4 class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-4">Results</h4>
          <div id="searchResults" class="space-y-2"></div>
        </div>
      </section>
    </div>
    <div class="flex flex-col h-full">
      <section class="bg-surface-container-lowest rounded-xl atmospheric-shadow border border-outline-variant/10 overflow-hidden flex-1">
        <div class="p-6 bg-surface-container-low/50">
          <h3 class="text-xl font-bold text-on-surface flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">list_alt</span> List User
          </h3>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-surface-container-low/30 border-b border-outline-variant/5">
                <th class="px-6 py-4 text-xs font-bold text-on-surface-variant uppercase tracking-wider">Name</th>
                <th class="px-6 py-4 text-xs font-bold text-on-surface-variant uppercase tracking-wider">Coordinates</th>
                <th class="px-6 py-4 text-xs font-bold text-on-surface-variant uppercase tracking-wider">Service Radius</th>
                <th class="px-6 py-4 text-xs font-bold text-on-surface-variant uppercase tracking-wider">Actions</th>
              </tr>
            </thead>
            <tbody id="userTableBody" class="divide-y divide-outline-variant/5"></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>
  <script>
    async function fetchUsers() {
      const res = await fetch('/users');
      const users = await res.json();
      const body = document.getElementById('userTableBody');
      body.innerHTML = users.map(u => `
        <tr class="hover:bg-surface-container-low transition-colors group">
          <td class="px-6 py-4">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded bg-primary-container flex items-center justify-center text-primary font-bold text-xs">${u.name[0]}</div>
              <span class="text-sm font-semibold text-on-surface">${u.name}</span>
            </div>
          </td>
          <td class="px-6 py-4 font-mono text-xs text-on-surface-variant">${u.latitude.toFixed(4)}° N, ${u.longitude.toFixed(4)}° E</td>
          <td class="px-6 py-4"><span class="text-xs font-mono bg-surface-container-highest px-2 py-1 rounded">${u.serviceRadius} km</span></td>
          <td class="px-6 py-4">
            <button onclick="deleteUser(${u.id})" class="text-error hover:text-error-dim"><span class="material-symbols-outlined text-sm">delete</span></button>
          </td>
        </tr>
      `).join('');
    }

    document.getElementById('addUserForm').onsubmit = async (e) => {
      e.preventDefault();

      clearErrors();

      const user = {
        name: document.getElementById('userName').value,
        latitude: parseFloat(document.getElementById('latitude').value),
        longitude: parseFloat(document.getElementById('longitude').value),
        serviceRadius: parseFloat(document.getElementById('serviceRadius').value)
      };

      try {
        const res = await fetch('/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(user)
        });

        const data = await res.json();

        if (!res.ok) {
          showErrors(data);
          return;
        }

        e.target.reset();
        document.getElementById('radiusValue').innerText = '250';
        await fetchUsers();

      } catch (err) {
        console.error(err);
      }
    };
    function clearErrors() {
      ['latitude', 'longitude', 'userName'].forEach(field => {
        const errorEl = document.getElementById(field + 'Error');
        const inputEl = document.getElementById(field);

        if (errorEl) {
          errorEl.innerText = '';
          errorEl.classList.add('hidden');
        }

        if (inputEl) {
          inputEl.classList.remove('border-red-500');
        }
      });
    }

    function showErrors(errors) {
      Object.keys(errors).forEach(field => {
        const errorEl = document.getElementById(field + 'Error');
        const inputEl = document.getElementById(field);

        if (errorEl) {
          errorEl.innerText = errors[field];
          errorEl.classList.remove('hidden');
        }

        if (inputEl) {
          inputEl.classList.add('border-red-500');
        }
      });
    }

    async function deleteUser(id) {
      if (confirm('Delete this user?')) {
        await fetch(`/users/${id}`, { method: 'DELETE' });
        fetchUsers();
      }
    }

    document.getElementById('searchform').onsubmit = async (e) => {
      e.preventDefault();
      const lat = document.getElementById('searchLat').value;
      const lon = document.getElementById('searchLon').value;
      if (!lat || !lon) return;
      const res = await fetch(`/search?lat=${lat}&lon=${lon}`);
      const results = await res.json();
      const div = document.getElementById('searchResults');
      div.innerHTML = results.length ? results.map(u => `
        <div class="flex items-center justify-between p-3 bg-surface-container-low rounded-lg hover:translate-x-1 transition-transform cursor-pointer">
          <div class="flex items-center gap-3 w-full">
          <div class="w-2 h-2 rounded-full bg-primary"></div>
            <div class="flex justify-between items-center w-full">
              <span class="text-sm font-medium text-on-surface">${u.name}</span>
              <span class="text-xs font-mono text-on-surface-variant">${u.distance.toFixed(4)} km away</span>
           </div>
          </div>
        </div>
      `).join('') : '<p class="text-xs text-on-surface-variant">No providers found in this area.</p>';
    }

    fetchUsers();
  </script>
</body>
</html>
